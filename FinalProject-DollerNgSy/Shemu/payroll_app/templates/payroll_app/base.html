{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shemu Payroll System</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'bootstrap/css/custom.css' %}">
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- navbar -->
<div class="navbar-wrapper">
    <nav class="navbar navbar-dark bg-dark rounded-nav">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">

            <div class="d-flex align-items-center">
                <img src="{% static 'bootstrap/images/logo.png' %}" alt="logo" width="30" height="30" class="me-2">
                <span class="brand-text">S H E M U</span>
            </div>

            <div class="d-flex align-items-center">
                {% block navbar %}
                    <a href="#" class="nav-btn me-3 text-decoration-none">Employees</a>
                    <a href="#" class="nav-btn text-decoration-none">Payslips</a>
                {% endblock %}
            </div>

        </div>
    </nav>
</div>

<!-- content -->
<div class="container mt-4 flex-grow-1">
    {% block content %}{% endblock %}
</div>

<!-- footer -->
<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026. So LeyGiT!</small>
</footer>

</body>
</html>
